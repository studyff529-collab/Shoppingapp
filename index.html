<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping App - Welcome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .banner-area {
            width: 100%;
            height: 180px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 2px dashed #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #999;
            font-size: 14px;
        }
        .main-content {
            text-align: center;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .get-started-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
            transition: transform 0.2s;
            width: 100%;
            margin-bottom: 25px;
        }
        .get-started-btn:active { transform: scale(0.95); }
        .info-text {
            color: #ff69b4;
            font-size: 18px;
            margin-bottom: 35px;
            font-weight: 500;
        }
        .know-more {
            color: #dc143c;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 2px solid #dc143c;
            padding-bottom: 3px;
            transition: all 0.3s;
        }
        .know-more:hover { color: #ff0000; border-bottom-color: #ff0000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner-area">Ads Area</div>
        <div class="main-content">
            <button class="get-started-btn" onclick="window.location.href='categories.html'">Get Started FREE</button>
            <p class="info-text">Start shopping 🛒 for daily use</p>
            <a href="#" class="know-more" onclick="alert('Know more about our shopping app!'); return false;">Know more</a>
        </div>
    </div>
</body>
</html>
