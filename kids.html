<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids & toy- Shopping App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-section {
            background: white;
            border-radius: 15px;
            padding: 20px 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .logo-circle {
            width: 50px;
            height: 50px;
            border: 3px solid #667eea;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .header-icons { display: flex; gap: 15px; }
        .header-icons span { font-size: 26px; cursor: pointer; position: relative; }
        .cart-badge {
            position: absolute;            top: -8px;
            right: -8px;
            background: #dc143c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .category-label {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        .offer-box {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cc 100%);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 3px 10px rgba(255, 215, 0, 0.3);
        }
        .offer-text { font-size: 16px; font-weight: 600; color: #333; }
        .offer-text span { color: #ff0000; font-weight: bold; }
        .green-tick { font-size: 24px; color: #28a745; font-weight: bold; }
        .white-section {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 20px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            overflow-y: auto;
            max-height: 70vh;
            -webkit-overflow-scrolling: touch;
        }
        .white-section::-webkit-scrollbar { width: 8px; }
        .white-section::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 10px; }
        .white-section::-webkit-scrollbar-thumb { background: #667eea; border-radius: 10px; }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;            margin-bottom: 20px;
            text-align: center;
        }
        .product-card {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .product-details {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            max-height: 48px;
            line-height: 1.5;
        }
        .price-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .main-price { font-size: 22px; font-weight: bold; color: #000; }
        .side-price { font-size: 16px; color: #666; text-decoration: line-through; }
        .discount-badge { font-size: 14px; color: #ff0000; font-weight: 600; }
        .link-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
        }
        .share-btn {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 3px 10px rgba(255, 193, 7, 0.3);
        }
        .add-to-cart-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(40, 167, 69, 0.3);
        }
        .no-products {
            text-align: center;
            color: #999;
            font-size: 16px;
            padding: 40px 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalSlide 0.3s ease;
        }
        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: #dc3545;
            color: white;
            border: none;
            width: 35px; height: 35px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
        }
        .modal-body { padding: 20px; }
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .modal-price {
            font-size: 24px;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
        }
        .modal-side-price {
            font-size: 16px;
            color: #666;
            text-decoration: line-through;            margin-left: 10px;
        }
        .modal-discount {
            display: inline-block;
            background: #ff0000;
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .modal-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
            text-transform: capitalize;
        }
        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .modal-btn.buy { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .modal-btn.share { background: #ffc107; color: #000; }
        .modal-btn.cart { background: #28a745; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-section">
            <div class="header">
                <div class="logo-circle"></div>
                <div class="header-icons">
                    <span>❤️</span>
                    <span onclick="window.location.href='cart.html'">                        🛒
                        <span class="cart-badge" id="cartBadge">0</span>
                    </span>
                </div>
            </div>
            <div class="category-label">kids & toy</div>
            <div class="offer-box">
                <div class="offer-text">
                    <span>80% OFF</span> on 1st order Applied
                </div>
                <div class="green-tick">✓</div>
            </div>
        </div>
        <div class="white-section">
            <h2 class="section-title">Available Products</h2>
            <div id="productsContainer"></div>
        </div>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <img src="" alt="Product" class="modal-image" id="modalImage">
            <div class="modal-body">
                <span class="modal-category" id="modalCategory"></span>
                <h3 class="modal-title" id="modalTitle"></h3>
                <div>
                    <span class="modal-price" id="modalPrice"></span>
                    <span class="modal-side-price" id="modalSidePrice"></span>
                </div>
                <span class="modal-discount">15% off</span>
                <div class="modal-buttons">
                    <button class="modal-btn buy" id="modalBuyBtn">🛒 Buy Now</button>
                    <button class="modal-btn share" id="modalShareBtn">📋 Copy Link</button>
                    <button class="modal-btn cart" id="modalCartBtn">❤️ Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ✅ HARDCODED FASHION PRODUCTS (Edit here!)
        const categoryProducts = [
            { id: 1, image: "fashion-1.jpg", details: "Red T-Shirt (shirt, t-shirt, cotton)", price: "168", sidePrice: "198", link: "https://example.com/1", category: "kids" },
          
            // ✅ Add more fashion products here!
        ];

        let currentModalProductId = null;
        function loadProducts() {
            const container = document.getElementById('productsContainer');
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('product');

            if (categoryProducts.length === 0) {
                container.innerHTML = '<div class="no-products">No products added yet</div>';
                return;
            }

            container.innerHTML = categoryProducts.map(product => `
                <div class="product-card" id="product-${product.id}" onclick="openProductModal(${product.id})" style="cursor:pointer;">
                    <img src="${product.image}" alt="Product" class="product-image">
                    <div class="product-details">${product.details}</div>
                    <div class="price-section">
                        <span class="main-price">₹${product.price}</span>
                        <span class="side-price">₹${product.sidePrice}</span>
                        <span class="discount-badge">15% off</span>
                    </div>
                    <button class="link-button" onclick="event.stopPropagation(); openLink('${product.link}')">Buy</button>
                    <button class="share-btn" onclick="event.stopPropagation(); copyProductLink(${product.id})">📋 Copy Link</button>
                    <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCart(${product.id})">Add to Cart</button>
                </div>
            `).join('');

            if (productId) {
                setTimeout(() => {
                    const element = document.getElementById(`product-${productId}`);
                    if (element) {
                        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        element.style.border = '3px solid #28a745';
                        element.style.boxShadow = '0 0 25px rgba(40, 167, 69, 0.7)';
                        setTimeout(() => {
                            element.style.border = 'none';
                            element.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
                        }, 4000);
                    }
                }, 800);
            }
        }

        function openProductModal(productId) {
            const product = categoryProducts.find(p => p.id === productId);
            if (product) {
                currentModalProductId = productId;
                document.getElementById('modalImage').src = product.image;
                document.getElementById('modalTitle').textContent = product.details;
                document.getElementById('modalPrice').textContent = '₹' + product.price;
                document.getElementById('modalSidePrice').textContent = '₹' + product.sidePrice;
                document.getElementById('modalCategory').textContent = product.category;                document.getElementById('modalBuyBtn').onclick = function() {
                    if (product.link) window.open(product.link, '_blank');
                    else alert('No link added for this product');
                };
                document.getElementById('modalShareBtn').onclick = function() { copyProductLink(productId); };
                document.getElementById('modalCartBtn').onclick = function() { addToCart(productId); };
                document.getElementById('productModal').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            currentModalProductId = null;
        }

        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        function openLink(url) {
            if (url) window.open(url, '_blank');
            else alert('No link added for this product');
        }

        function copyProductLink(productId) {
            const baseUrl = window.location.href.split('?')[0];
            const shareLink = `${baseUrl}?product=${productId}`;
            navigator.clipboard.writeText(shareLink).then(() => {
                alert('Link copied to clipboard! 📋\n\n' + shareLink);
            }).catch(err => {
                const textArea = document.createElement('textarea');
                textArea.value = shareLink;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('Link copied to clipboard! 📋\n\n' + shareLink);
            });
        }

        function addToCart(productId) {
            const product = categoryProducts.find(p => p.id === productId);
            if (product) {
                let cart = JSON.parse(localStorage.getItem('cart')) || [];                cart.push(product);
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartBadge();
                alert('Product added to cart! ❤️');
            }
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cartBadge');
            if (badge) {
                const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                badge.textContent = totalItems;
                badge.style.display = totalItems > 0 ? 'flex' : 'none';
            }
        }

        window.addEventListener('load', function() {
            loadProducts();
            updateCartBadge();
        });
    </script>
</body>
</html>
